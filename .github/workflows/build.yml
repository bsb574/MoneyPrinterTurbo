name: 构建 Windows / macOS 版本

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 FFmpeg
        run: choco install ffmpeg -y

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller moviepy==2.2.1 edge_tts==7.2.7 loguru requests pydantic toml numpy pillow streamlit fastapi uvicorn python-multipart openai pydub redis

      - name: 打包
        run: |
          chcp 65001
          python build.py

      - name: 上传构建产物 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: 口播视频生成-Windows
          path: dist/口播视频生成/

      - name: 打包为 zip
        run: |
          cd dist
          Compress-Archive -Path "口播视频生成" -DestinationPath "口播视频生成-Windows.zip"

      - name: 上传 zip (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: 口播视频生成-Windows-zip
          path: dist/口播视频生成-Windows.zip

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 FFmpeg
        run: brew install ffmpeg

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller moviepy==2.2.1 edge_tts==7.2.7 loguru requests pydantic toml numpy pillow streamlit fastapi uvicorn python-multipart openai pydub redis

      - name: 打包
        run: python build.py

      - name: 上传构建产物 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: 口播视频生成-macOS
          path: dist/口播视频生成/

      - name: 打包为 zip
        run: |
          cd dist
          zip -r 口播视频生成-macOS.zip 口播视频生成

      - name: 上传 zip (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: 口播视频生成-macOS-zip
          path: dist/口播视频生成-macOS.zip
